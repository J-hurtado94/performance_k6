trigger: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - script: |
      docker run --rm \
        -v $(System.DefaultWorkingDirectory):/work \
        -w /work \
        grafana/k6:latest run test.js
    displayName: 'Ejecución prueba con Docker (k6)'
  


 #Publicar el summary.json como artefacto
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/summary.html'
      artifact: 'k6-report-html'
      publishLocation: 'pipeline'
    displayName: 'Publicar reporte HTML'
