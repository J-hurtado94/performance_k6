trigger: none
pool:
  vmImage: 'ubuntu-latest'

variables:
  ZAP_IMAGE: 'ghcr.io/zaproxy/zaproxy:stable'
  TARGET_URL: 'https://globalmvm.com/'
  WORK_DIR: 'zap_wrk'
  HTML_REPORT: 'testreport.html'
  GEN_CONF: 'gen.conf'

steps:
- script: |
    set -e
    mkdir -p "$(System.DefaultWorkingDirectory)/$(WORK_DIR)"
    chmod 777 "$(System.DefaultWorkingDirectory)/$(WORK_DIR)"
    docker pull "$(ZAP_IMAGE)"
    # Ejecuta ZAP y captura el exit code SIN romper el step
    set +e
    docker run --rm --user 0:0 \
      -v "$(System.DefaultWorkingDirectory)/$(WORK_DIR)":/zap/wrk/:rw \
      "$(ZAP_IMAGE)" zap-baseline.py \
        -t "$(TARGET_URL)" \
        -g "$(GEN_CONF)" \
        -r "$(HTML_REPORT)"
    EXIT_CODE=$?
    set -e
    echo "ZAP_EXIT_CODE=$EXIT_CODE"
    # Política: solo fallar si es 2 (FAIL) o 3 (ERROR)
    if [ "$EXIT_CODE" -eq 2 ] || [ "$EXIT_CODE" -eq 3 ]; then
      echo "##vso[task.logissue type=error]ZAP Baseline devolvió FAIL/ERROR ($EXIT_CODE)"
      exit $EXIT_CODE
    fi
  displayName: "Run ZAP Baseline"

- task: PublishBuildArtifacts@1
  displayName: "Publicar artefactos ZAP"
  condition: succeededOrFailed()
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)/$(WORK_DIR)'
    ArtifactName: 'zap-baseline-output'
    publishLocation: 'Container' 