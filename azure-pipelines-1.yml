trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  ZAP_IMAGE: 'ghcr.io/zaproxy/zaproxy:stable'
  TARGET_URL: 'https://globalmvm.com/'   # <-- ajusta si hace falta
  ZAP_WRK_DIR: 'zap_wrk'                 # carpeta local para mapear a /zap/wrk

stages:
- stage: ZAP_Baseline
  displayName: ZAP Baseline
  jobs:
  - job: Run_ZAP_Baseline
    displayName: Ejecutar ZAP Baseline
    steps:
    - script: |
        set -e
        echo "Preparando carpeta de trabajo…"
        mkdir -p $(System.DefaultWorkingDirectory)/$(ZAP_WRK_DIR)

        echo "Pull de imagen $(ZAP_IMAGE)…"
        docker pull $(ZAP_IMAGE)

        echo "Ejecutando ZAP Baseline contra $(TARGET_URL)…"
        # Montamos un volumen en /zap/wrk para que el Automation Framework pueda escribir zap.yaml, etc.
        # SIN -r/-J/-x => todo sale por consola.
        # Desactivamos la API key para evitar prompts.
        set +e
        docker run --rm \
          -v $(System.DefaultWorkingDirectory)/$(ZAP_WRK_DIR):/zap/wrk \
          $(ZAP_IMAGE) zap-baseline.py \
            -t $(TARGET_URL) \
            -m 5 \
            -d \
            -z "-config api.disablekey=true"
        EXIT_CODE=$?
        set -e

        echo "ZAP_EXIT_CODE=$EXIT_CODE" | tee zap_exit_code.txt
      displayName: 'Run zap-baseline.py'

    - script: |
        EXIT=$(cut -d'=' -f2 zap_exit_code.txt)
        echo "Código de salida de ZAP: $EXIT"
        # 0 = Pass, 1 = Warn, 2 = Fail, 3 = Error
        if [ "$EXIT" -eq 2 ] || [ "$EXIT" -eq 3 ]; then
          echo "##vso[task.logissue type=error]ZAP Baseline devolvió FAIL/ERROR ($EXIT)"
          exit $EXIT
        fi
      displayName: 'Evaluar resultado'